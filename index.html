<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>StreamTube</title>

<link rel="stylesheet" href="style.css">

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet"
/>

<script src="https://www.youtube.com/iframe_api"></script>

</head>

<body>

<div id="loginScreen">

<div class="login-box">

<h1>
STREAMTUBE
</h1>

<input
type="text"
id="username"
placeholder="Usuário"
/>

<input
type="password"
id="password"
placeholder="Senha"
/>

<button onclick="login()">
Entrar
</button>

<p id="loginError"></p>

</div>

</div>

<header class="topbar">

<div class="logo">
STREAMTUBE
</div>

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Pesquisar vídeos..."
oninput="searchVideos()"
/>

<button onclick="clearSearch()">
Limpar
</button>

</div>

<div class="header-buttons">

<button onclick="showFavorites()">
Favoritos
</button>
